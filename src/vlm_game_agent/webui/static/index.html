<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLM Game Agent - 远程监看</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }
    #app { display: flex; height: 100vh; }

    /* 左侧：画面 */
    .panel-left {
      flex: 2;
      display: flex;
      flex-direction: column;
      padding: 12px;
      border-right: 1px solid #333;
      min-width: 0;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #888;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .status-dot.online { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.offline { background: #f44336; box-shadow: 0 0 6px #f44336; }
    .frame-container {
      flex: 1;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #333;
    }
    .frame-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .frame-placeholder {
      color: #555;
      font-size: 16px;
    }

    /* 右侧：日志 + 输入 */
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      min-width: 300px;
      max-width: 450px;
    }
    .log-container {
      flex: 1;
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #333;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-entry {
      margin-bottom: 6px;
      word-break: break-word;
    }
    .log-entry.info { color: #ccc; }
    .log-entry.debug { color: #888; }
    .log-entry.warning { color: #ff9800; }
    .log-entry.error { color: #f44336; }
    .log-entry.user { color: #2196f3; font-weight: bold; }
    .log-entry.action { color: #9c27b0; }
    .log-time {
      color: #666;
      margin-right: 6px;
      font-size: 11px;
    }
    .log-entry.prompt {
      color: #66bb6a;
      cursor: pointer;
    }
    .log-entry.system_prompt {
      color: #ffa726;
      cursor: pointer;
    }
    .log-entry.user_prompt {
      color: #42a5f5;
      cursor: pointer;
    }
    .log-entry.prompt .prompt-header,
    .log-entry.system_prompt .prompt-header,
    .log-entry.user_prompt .prompt-header {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .log-entry.prompt .prompt-arrow,
    .log-entry.system_prompt .prompt-arrow,
    .log-entry.user_prompt .prompt-arrow {
      font-size: 10px;
      transition: transform 0.2s;
    }
    .log-entry.prompt .prompt-arrow.open,
    .log-entry.system_prompt .prompt-arrow.open,
    .log-entry.user_prompt .prompt-arrow.open {
      transform: rotate(90deg);
    }
    .log-entry.prompt .prompt-body {
      margin-top: 4px;
      padding: 6px 8px;
      background: #1e2a1e;
      border-radius: 4px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-entry.system_prompt .prompt-body {
      margin-top: 4px;
      padding: 6px 8px;
      background: #2a2418;
      border-radius: 4px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-entry.user_prompt .prompt-body {
      margin-top: 4px;
      padding: 6px 8px;
      background: #182028;
      border-radius: 4px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }
    .input-area input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #4caf50; }
    .input-area button {
      padding: 10px 18px;
      border-radius: 6px;
      border: none;
      background: #4caf50;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-area button:hover { background: #45a049; }
    .input-area button:disabled { background: #555; cursor: not-allowed; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #777;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      body { overflow: auto; }
      #app { flex-direction: column; height: auto; min-height: 100vh; }
      .panel-left {
        flex: none;
        height: 50vh;
        border-right: none;
        border-bottom: 1px solid #333;
        padding: 8px;
      }
      .panel-right {
        flex: none;
        min-width: auto;
        max-width: none;
        height: 50vh;
        padding: 8px;
      }
      .panel-header { font-size: 12px; margin-bottom: 6px; }
      .frame-placeholder { font-size: 14px; }
      .log-container { font-size: 12px; padding: 8px; }
      .stats { gap: 10px; font-size: 11px; }
      .input-area input, .input-area button { font-size: 13px; padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel-left">
      <div class="panel-header">
        <span>实时画面</span>
        <div class="status">
          <span>WebSocket</span>
          <div class="status-dot" :class="wsConnected ? 'online' : 'offline'"></div>
          <span>{{ wsConnected ? '在线' : '离线' }}</span>
        </div>
      </div>
      <div class="stats">
        <span>FPS: {{ fps }}</span>
        <span>画面尺寸: {{ frameSize }}</span>
        <span>日志: {{ logs.length }} 条</span>
      </div>
      <div class="frame-container">
        <img v-if="frameSrc" :src="frameSrc" alt="实时画面">
        <div v-else class="frame-placeholder">等待画面推送...</div>
      </div>
    </div>

    <div class="panel-right">
      <div class="panel-header">
        <span>Agent 日志 / 思考流</span>
      </div>
      <div class="log-container" ref="logBox">
        <div
          v-for="(log, idx) in logs"
          :key="idx"
          class="log-entry"
          :class="log.level"
          @click="['prompt','system_prompt','user_prompt'].includes(log.level) && togglePrompt(idx)"
        >
          <span class="log-time">{{ log.time }}</span>
          <template v-if="log.level === 'system_prompt'">
            <div class="prompt-header">
              <span class="prompt-arrow" :class="{ open: log.expanded }">▶</span>
              <span>🤖 系统提示词 (点击展开)</span>
            </div>
            <div v-if="log.expanded" class="prompt-body system-prompt-body">{{ log.text }}</div>
          </template>
          <template v-else-if="log.level === 'user_prompt'">
            <div class="prompt-header">
              <span class="prompt-arrow" :class="{ open: log.expanded }">▶</span>
              <span>👤 用户提示词 (点击展开)</span>
            </div>
            <div v-if="log.expanded" class="prompt-body user-prompt-body">{{ log.text }}</div>
          </template>
          <template v-else-if="log.level === 'prompt'">
            <div class="prompt-header">
              <span class="prompt-arrow" :class="{ open: log.expanded }">▶</span>
              <span>📤 Prompt (点击展开)</span>
            </div>
            <div v-if="log.expanded" class="prompt-body">{{ log.text }}</div>
          </template>
          <template v-else>
            <span>{{ log.text }}</span>
          </template>
        </div>
      </div>
      <div class="input-area">
        <input
          v-model="commandText"
          placeholder="输入指令发给 Agent..."
          @keyup.enter="sendCommand"
          :disabled="!wsConnected"
        >
        <button @click="sendCommand" :disabled="!wsConnected || !commandText.trim()">
          发送
        </button>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          ws: null,
          wsConnected: false,
          frameSrc: '',
          frameSize: '-',
          logs: [],
          commandText: '',
          fps: 0,
          lastFrameTime: 0,
          frameCount: 0,
        };
      },
      mounted() {
        this.connectWebSocket();
        // 计算 FPS
        setInterval(() => {
          this.fps = this.frameCount;
          this.frameCount = 0;
        }, 1000);
      },
      methods: {
        connectWebSocket() {
          const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = `${protocol}//${window.location.host}/ws`;
          this.ws = new WebSocket(wsUrl);

          this.ws.onopen = () => {
            this.wsConnected = true;
            this.addLog('系统', 'WebSocket 已连接', 'info');
          };

          this.ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              this.handleMessage(msg);
            } catch (e) {
              console.error('消息解析失败:', event.data);
            }
          };

          this.ws.onclose = () => {
            this.wsConnected = false;
            this.addLog('系统', 'WebSocket 已断开，3秒后重连...', 'warning');
            setTimeout(() => this.connectWebSocket(), 3000);
          };

          this.ws.onerror = (err) => {
            console.error('WebSocket 错误:', err);
          };
        },

        handleMessage(msg) {
          if (msg.type === 'frame') {
            const mime = msg.data.startsWith('/9j/') ? 'image/jpeg'
                       : msg.data.startsWith('iVBOR') ? 'image/png'
                       : 'image/png';
            this.frameSrc = 'data:' + mime + ';base64,' + msg.data;
            this.frameCount++;
            // 简单估算尺寸
            const sizeBytes = Math.round(msg.data.length * 0.75);
            this.frameSize = sizeBytes > 1024
              ? (sizeBytes / 1024).toFixed(1) + ' KB'
              : sizeBytes + ' B';
          } else if (msg.type === 'log') {
            this.addLog('', msg.text, msg.level || 'info');
          } else if (msg.type === 'action') {
            const status = msg.status || 'ok';
            const resultText = msg.result || '';
            let displayText = `${msg.action}: ${msg.detail}`;
            let level = 'action';
            if (status === 'error') {
              displayText += ` ❌ 失败${resultText ? ' - ' + resultText : ''}`;
              level = 'error';
            } else {
              displayText += ` ✅${resultText ? ' ' + resultText : ' 成功'}`;
            }
            this.addLog('动作', displayText, level);
          } else if (msg.type === 'prompt') {
            this.addLog('', msg.text, msg.subtype || 'prompt');
          } else if (msg.type === 'pong') {
            // 心跳回应
          }
        },

        addLog(tag, text, level) {
          const now = new Date();
          const time = now.toLocaleTimeString('zh-CN', { hour12: false });
          const display = tag ? `[${tag}] ${text}` : text;
          this.logs.push({ time, text: display, level });
          // 限制日志条数，防止内存泄漏
          if (this.logs.length > 500) {
            this.logs = this.logs.slice(-300);
          }
          // 自动滚动到底部
          this.$nextTick(() => {
            const box = this.$refs.logBox;
            if (box) box.scrollTop = box.scrollHeight;
          });
        },

        sendCommand() {
          const text = this.commandText.trim();
          if (!text || !wsConnected) return;
          this.ws.send(JSON.stringify({ type: 'command', text }));
          this.commandText = '';
        },

        togglePrompt(idx) {
          this.logs[idx].expanded = !this.logs[idx].expanded;
        },
      },
    }).mount('#app');
  </script>
</body>
</html>
